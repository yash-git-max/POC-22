version: 0.2

phases:
  install:
    commands:
      - npm install

  build:
    commands:
      - echo "Build completed"

  post_build:
    commands:
      - echo "Deploying to EC2"

      - printf "%s" "$EC2_KEY" > POC-22key.pem
      - chmod 400 POC-22key.pem

      - ssh -i POC-22key.pem -o StrictHostKeyChecking=no ec2-user@3.108.53.69 "cd poc-22 && git pull && npm install && pkill -f app.js || true && nohup node app.js > app.log 2>&1 &"
